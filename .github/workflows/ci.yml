# Three-job CI: lint / test / harness. Same shape as the sister
# Microsoft-Graph MCP projects (sharepoint-mcp, outlook-mcp). The
# harness job is gated behind a repo secret and skips silently when
# absent, so PRs from forks don't get blocked.
#
# Per ENGINEERING_PRINCIPLES § 6 (CI vigilance): every push is watched
# to completion; trunk red is a P0 incident.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install package + dev dependencies
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format check
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src/microsoft_tasks_mcp tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compare licences
        run: diff LICENSE LICENSE-MIT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install package + dev dependencies
        run: uv sync --extra dev

      - name: Run unit + integration tests with coverage
        run: ./tests/run_tests.sh

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage.xml') != '' }}
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: false

  harness:
    runs-on: ubuntu-latest
    needs: test
    # Run harness tests against the real Microsoft 365 sandbox using the
    # cached refresh token from the MS_TASKS_HARNESS_TOKEN_JSON secret.
    # Skips silently when the secret isn't available (e.g. on PRs from
    # forks where secrets aren't passed) so external contributions
    # aren't blocked on something they can't provide.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install package + dev dependencies
        run: uv sync --extra dev

      - name: Restore harness token cache from secret (work/school)
        env:
          TOKEN_B64: ${{ secrets.MS_TASKS_HARNESS_TOKEN_JSON }}
        run: |
          if [ -z "$TOKEN_B64" ]; then
            echo "::warning::MS_TASKS_HARNESS_TOKEN_JSON not set — work/school harness tests will be skipped."
            exit 0
          fi
          mkdir -p ~/.cache/mcp-server-microsoft-tasks/harness
          printf '%s' "$TOKEN_B64" | base64 -d > ~/.cache/mcp-server-microsoft-tasks/harness/token.json
          chmod 600 ~/.cache/mcp-server-microsoft-tasks/harness/token.json
          echo "Work/school harness token cache restored ($(wc -c < ~/.cache/mcp-server-microsoft-tasks/harness/token.json) bytes)."

      - name: Restore harness-personal token cache from secret
        env:
          TOKEN_B64: ${{ secrets.MS_TASKS_HARNESS_PERSONAL_TOKEN_JSON }}
        run: |
          if [ -z "$TOKEN_B64" ]; then
            echo "::notice::MS_TASKS_HARNESS_PERSONAL_TOKEN_JSON not set — personal-account harness tests will be skipped."
            exit 0
          fi
          mkdir -p ~/.cache/mcp-server-microsoft-tasks/harness-personal
          printf '%s' "$TOKEN_B64" | base64 -d > ~/.cache/mcp-server-microsoft-tasks/harness-personal/token.json
          chmod 600 ~/.cache/mcp-server-microsoft-tasks/harness-personal/token.json
          echo "Personal harness token cache restored ($(wc -c < ~/.cache/mcp-server-microsoft-tasks/harness-personal/token.json) bytes)."

      - name: Run harness tests against real Microsoft Graph
        env:
          # Use plain-file backend explicitly (CI runners have no keyring).
          MS_TASKS_TOKEN_STORE: file
        run: ./tests/run_tests.sh harness
